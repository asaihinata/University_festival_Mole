<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="Content-Language" content="ja">
		<meta name="google" content="notranslate">
		<title>モグラたたきゲーム</title>
		<link rel="stylesheet" href="./src/css/allcss.css">
		<link rel="icon" href="./data/img/mogura.png">
		<script src="./src/js/jquery/jquery-3.7.1.slim.min.js"></script>
		<script src="./src/js/easy.js"></script>
		<script>
			document.getElementsByTagName("html")[0].oncontextmenu=function(){
				return false;
			}
			document.onselectstart=function(){
				return false;
			}
		</script>
	</head>
	<body oncopy="return false">
		<div class="main">
			<div class="startbox">
				<div class="start_box">
					<div class="text under">
						<a onclick="start()">スタート</a>
					</div>
				</div>
			</div>
			<div class="main_game">
				<table class="top_table">
					<tr>
						<td class="text">
							<ruby>残<rp>(</rp><rt>のこ</rt><rp>)</rp></ruby>り
							<ruby>時間<rp>(</rp><rt>じかん</rt><rp>)</rp></ruby><br>
							<span class="text timestext"></span>
						</td>
						<td class="showtable"></td>
						<td class="text">スコア<br><span class="scorenum">0</span>ポイント</td>
					</tr>
				</table>
				<script>
					var t1="<table>";
					for(i=1;i<=6;i++){
						if((i%3)==1){
							t1+="<tr>"
						}
						t1+=`
							<td class="background">
								<div>
									<div class="boxs${i}" onclick="point(3,${i})" id="mole${i}">
										<div class="backgroundmogura"></div>
									</div>
								</div>
							</td>`;
						if((i%3)==0){
							t1+="</tr>";
						}
					}
					$(".showtable").html(t1+"</table>");
				</script>
			</div>
			<div class="ends">
				<dialog class="dialogs">
					<p>
						あなたのスコアは<span class="scoreshow">です!</span>
					</p>
					<a onclick="onechance()" class="text1 under">
						<p>
							もう
							<ruby>
								一回
								<rp>
									(
								</rp>
								<rt>
									いっかい
								</rt>
								<rp>
									)
								</rp>
							</ruby>
							やる
						</p>
					</a>
				</dialog>
			</div>
		</div>
	</body>
</html>
